<!DOCTYPE html>
<html lang="en">

<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Site title -->
    <title>Day Manager - Your perfect task assistant.</title>

    <!-- Site Favicon -->
    <link rel="shortcut icon" href="/Day-Planning/Frontend/Media/Logo/Day-Manager-icon.png" type="image/x-icon">

    <!-- Stylesheets -->
        <!-- Global Stylesheet -->
        <link rel="stylesheet" href="/Day-Planning/Frontend/Pages/Common files/common.css">
        
        <!-- Indivisual Stylesheet -->
        <link rel="stylesheet" href="style.css">
    
    <!-- Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
        <link href="https://fonts.googleapis.com/css2?family=Boldonse&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet" >

</head>

<body>
    
    <!-- Home section -->
    <section class="home">
        
        <!-- Content box -->
        <article class="home__content">
            
            <!-- title -->
            <h1 class="home__title">
                
                Plan your day
                
                <!-- fetching the day icon from Icons.svg file -->
                <svg class="day-icon icons">
                    <use href="/Day-Planning/Frontend/Media/Icons/Icons.svg#day-icon" class="icons"></use>
                </svg>
                    
                based on <br /> your  energy
                
                <!-- fetching the energy icon from Icons.svg file -->
                <svg class="energy-icon icons">
                    <use href="/Day-Planning/Frontend/Media/Icons/Icons.svg#energy-icon"></use>
                </svg> and priorities.      
            </h1>
            
            <!-- subtitle -->
            <h2 class="home__subtitle">
                
                The way you plan your day defines how you live it.
                
                <!-- applying speacial style to the text with CSS class -->
                <span class="highlight">— Day Manager</span>
            
            </h2>

            <!-- paragraph -->
            <p class="home__para">
                
                Stop guessing what to do next. Add your tasks, and the system will organize them based on priority, urgency, and your energy level.

            </p>

            <!-- CTA button -->
            <a href="/Day-Planning/Frontend/Pages/Login/Login.html" target="_self">
                <button class="home__planning-btn buttons">Start Planning</button>
            </a>
        
        </article>

        <!-- floating images -->
        <img class="image-board images"
            alt="pins on the board" 
            src="https://images.unsplash.com/photo-1570649236495-42fa5fe5c48b?q=80&w=387&auto=formatfit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
        >
        
        <img class="image-desk images"
            alt="book on a desk" 
            src="https://images.unsplash.com/photo-1692158961403-4d2a98e9878e?q=80&w=580&auto=formatfit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
        >
        
        <img class="image-cleaning images"
            alt="wearing cleaning gloves" 
            src="https://plus.unsplash.com/premium_photo-1664372899150-f1cc68364af7?q=80&w=406auto=format&fit=crop&ixlib=rb-4.1.0ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
        >
    </section>

</body>
</html>
