<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Site title -->
    <title>Day Manager - Join Us</title>

    <!-- Site favicon -->
    <link
      rel="shortcut icon"
      href="../../Media/Logo/Day-Manager-icon.png"
      type="image/x-icon"
    />

    <!-- Stylesheets -->
    <!-- Global stylesheet -->
    <link rel="stylesheet" href="../Common files/common.css" />

    <!-- Indivisual stylesheet -->
    <link rel="stylesheet" href="./sign-in.css" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Boldonse&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- Signup section -->
    <section class="signup">
      <!-- signup container -->
      <article class="signup__container">
        <!-- signup page content -->
        <div class="signup__content">
          <!-- grouping the title and subtitle -->
          <div class="title-box">
            <h1 class="signup__title">Join us</h1>
            <h2 class="signup__subtitle">
              Log in to continue planning your day
            </h2>
          </div>

          <!-- signup form -->
          <form action="" class="signup__form">
            <!-- group of input elements -->
            <div class="input-container">
              <!-- username input -->
              <input
                class="input__user input__fields"
                type="text"
                name=""
                id=""
                placeholder="Your Name"
                required
              />

              <!-- email input -->
              <input
                class="input__email input__fields"
                type="email"
                name=""
                id=""
                placeholder="Your Email Here"
                required
              />

              <!-- password input -->
              <input
                class="input__password input__fields"
                type="password"
                name=""
                id=""
                minlength="10"
                placeholder="Password here"
                required
              />

              <!-- submit button -->
              <button class="signup-btn buttons" type="submit">
                Sign me up ✔
              </button>
            </div>
          </form>
        </div>

        <!-- signup page image -->
        <div class="signup__image"></div>
      </article>
    </section>
  </body>
</html>
