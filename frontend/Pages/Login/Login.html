<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Site title -->
    <title>Day Manager - Tell us about yourself</title>

    <!-- Site favicon -->
    <link
      rel="shortcut icon"
      href="../../Media/Logo/Day-Manager-icon.png"
      type="image/x-icon"
    />

    <!-- Stylesheets -->
    <!-- Global stylesheet -->
    <link rel="stylesheet" href="../Common files/common.css" />

    <!-- Indivisual stylesheet -->
    <link rel="stylesheet" href="./Login.css" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Boldonse&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- Login section -->
    <section class="login">
      <!-- login container -->
      <article class="login__container">
        <!-- login page content -->
        <div class="login__content">
          <!-- grouping the title and subtitle -->
          <div>
            <h1 class="login__title">Welcome back!</h1>
            <h2 class="login__subtitle">
              Log in to continue planning your day
            </h2>
          </div>

          <!-- login form -->
          <form action="" class="login__form">
            <!-- group of input elements -->
            <div class="input-container">
              <!-- email input -->
              <input
                class="input__email input__fields"
                type="email"
                name=""
                id=""
                placeholder="Your Email Here"
                required
              />

              <!-- password input -->
              <input
                class="input__password input__fields"
                type="password"
                name=""
                id=""
                placeholder="Password here"
                required
              />

              <!-- submit button -->
              <button class="login-btn buttons" type="submit">Login</button>

              <!-- signin page referal -->
              <p class="create-account">
                Don’t have an account?
                <a href="../Sign-in/sign-in.html">
                  <span class="highlight">Create one</span></a
                >
              </p>
            </div>
          </form>
        </div>

        <!-- login page image -->
        <div class="login__image"></div>
      </article>
    </section>
  </body>
</html>
