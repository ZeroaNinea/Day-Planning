<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day Manager - Create new account</title>

    <link rel="shortcut icon" href="/Media/to-do icon.png" type="image/x-icon">
    <link rel="stylesheet" href="sign-in.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Boldonse&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    
</head>
<body>
    <section class="signup">
        <article class="signup__container">
            <div class="signup__content">
                <div class="title-box">
                    <h1 class="signup__title">Join us</h1>
                    <h2 class="signup__subtitle">Log in to continue planning your day</h2>
                </div>
                
                <form action="" class="signup__form">
                    <div class="input-container">
                        <input class="input__user input__fields" type="text"  name="" id="" placeholder="Your Name" required>
                        <input class="input__email input__fields" type="email"  name="" id="" placeholder="Your Email Here" required>
                        <input class="input__password input__fields" type="password" name="" id="" minlength="10" placeholder="Password here" required>
                        <button class="signup-btn buttons" type="submit">Login</button>
                    </div>
                </form>
            </div>
            
            <div class="signup__image"></div>
        </article>
    </section>
</body>
</html>
