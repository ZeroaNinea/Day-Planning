<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Day Manager - Tell us about yourself.</title>

    <link
      rel="shortcut icon"
      href="/Media/to-do icon.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="Login.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Boldonse&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <section class="login">
      <article class="login__container">
        <div class="login__content">
          <div>
            <h1 class="login__title">Welcome back!</h1>
            <h2 class="login__subtitle">
              Log in to continue planning your day
            </h2>
          </div>

          <form action="" class="login__form">
            <div class="input-container">
              <input
                class="input__email input__fields"
                type="email"
                name=""
                id=""
                placeholder="Your Email Here"
                required
              />
              <input
                class="input__password input__fields"
                type="password"
                name=""
                id=""
                placeholder="Password here"
                required
              />
              <button class="login-btn buttons" type="submit">Login</button>
              <p class="create-account">
                Don’t have an account?
                <a href="/sign-in.html">
                  <span class="highlight">Create one</span></a
                >
              </p>
            </div>
          </form>
        </div>

        <div class="login__image"></div>
      </article>
    </section>
  </body>
</html>
